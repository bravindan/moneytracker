<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="0" y="0" width="512" height="512" rx="100" fill="url(#grad)"/>
  <!-- Wallet body -->
  <rect x="120" y="160" width="272" height="200" rx="20" fill="white" opacity="0.95"/>
  <!-- Wallet flap -->
  <path d="M120 200 L120 180 Q120 160 140 160 L372 160 Q392 160 392 180 L392 200" fill="white"/>
  <!-- Wallet clasp -->
  <circle cx="340" cy="260" r="20" fill="#10b981"/>
  <circle cx="340" cy="260" r="10" fill="white"/>
  <!-- Dollar sign -->
  <text x="256" y="285" font-family="Arial, sans-serif" font-size="60" font-weight="bold" fill="#10b981" text-anchor="middle">$</text>
</svg>
