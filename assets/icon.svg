<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#047857;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  <!-- Rounded square background -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#grad)"/>
  <!-- Wallet body -->
  <rect x="100" y="155" width="312" height="210" rx="24" fill="white" filter="url(#shadow)"/>
  <!-- Wallet flap -->
  <path d="M100 195 L100 175 Q100 155 120 155 L392 155 Q412 155 412 175 L412 195" fill="white"/>
  <!-- Wallet clasp -->
  <circle cx="355" cy="260" r="24" fill="#10b981"/>
  <circle cx="355" cy="260" r="12" fill="white"/>
  <!-- Dollar sign -->
  <text x="256" y="290" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="bold" fill="#10b981" text-anchor="middle">$</text>
</svg>
